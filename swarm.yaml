п»ї# swarm.yaml Гўв‚¬вЂќ DCA Swarm Bundle Config
# Each bundle maps to a set of parallel lanes.
# Agents listed under `agents` are external repos that participate
# via the tap919-middleman REST bridge.
#
# Routes map task-name ГўвЂ вЂ™ skill_pack path for the MoE Router.
# Aliases improve NLU cosine matching when user phrasing doesn't
# match the skill directory name exactly.

bundles:

  scaffold-rest-api:
    description: "Scaffold a full REST API resource with audit"
    agents:
      - tap919-middleman
      - deterministic-brain
    lanes:
      - lanes.scaffold_rest_api

  live-docs-to-skill:
    description: "Scrape a docs URL and generate a skill.md stub"
    agents:
      - browser-harness
      - deterministic-brain
    lanes:
      - lanes.live_docs_to_skill

  audit-repo:
    description: "Walk a local repo, lint every file, score and report"
    agents:
      - deterministic-brain
    lanes:
      - lanes.audit_repo

routes:
  # ГўвЂќв‚¬ГўвЂќв‚¬ Existing skills ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deterministic Brain — Control Center</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#090c10; --surface:#0d1117; --surface2:#161b22; --border:#21262d;
      --cyan:#00ffe7; --green:#39ff14; --pink:#ff2d78; --blue:#4d9fff;
      --yel:#ffe600; --purple:#bf5fff; --orange:#ff8c00;
      --text:#c9d1d9; --dim:#6e7681;
      --r:8px;
      --mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
      --ui:'Inter',system-ui,sans-serif;
    }
    html,body{background:var(--bg);color:var(--text);font-family:var(--ui);font-size:14px;min-height:100vh;}
    a{color:var(--cyan);text-decoration:none;}
    ::-webkit-scrollbar{width:5px;background:var(--surface);}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    #app{display:grid;grid-template-rows:56px 1fr;grid-template-columns:220px 1fr;grid-template-areas:"topbar topbar" "sidebar main";height:100vh;overflow:hidden;}

    /* topbar */
    #topbar{grid-area:topbar;display:flex;align-items:center;gap:14px;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);z-index:10;}
    .logo{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--cyan);letter-spacing:1px;text-shadow:0 0 12px var(--cyan);}
    .logo span{color:var(--pink);}
    .status-pill{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .badge{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:11px;font-family:var(--mono);color:var(--dim);}
    .badge.cyan{border-color:var(--cyan);color:var(--cyan);}
    .badge.green{border-color:var(--green);color:var(--green);}
    .badge.pink{border-color:var(--pink);color:var(--pink);}
    .badge.yel{border-color:var(--yel);color:var(--yel);}

    /* sidebar */
    #sidebar{grid-area:sidebar;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 0;overflow-y:auto;}
    .nav-sec{padding:4px 16px 8px;font-size:10px;font-family:var(--mono);letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-top:8px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;font-size:13px;color:var(--dim);border-left:2px solid transparent;transition:all .15s;}
    .nav-item:hover{background:var(--surface2);color:var(--text);border-left-color:var(--cyan);}
    .nav-item.active{background:var(--surface2);color:var(--cyan);border-left-color:var(--cyan);}

    /* main */
    #main{grid-area:main;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:24px;}
    .page{display:none;flex-direction:column;gap:20px;}
    .page.active{display:flex;}

    /* section header */
    .sh{display:flex;align-items:center;gap:12px;margin-bottom:4px;}
    .sh h2{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);letter-spacing:.5px;}
    .sh .line{flex:1;height:1px;background:var(--border);}

    /* cards */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;}
    .stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:6px;}
    .stat .lbl{font-size:10px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:1px;}
    .stat .val{font-size:26px;font-family:var(--mono);font-weight:700;color:var(--cyan);text-shadow:0 0 14px rgba(0,255,231,.3);}
    .stat.green .val{color:var(--green);text-shadow:0 0 14px rgba(57,255,20,.3);}
    .stat.pink  .val{color:var(--pink); text-shadow:0 0 14px rgba(255,45,120,.3);}
    .stat.blue  .val{color:var(--blue); text-shadow:0 0 14px rgba(77,159,255,.3);}
    .stat.yel   .val{color:var(--yel);  text-shadow:0 0 14px rgba(255,230,0,.3);}
    .stat.pur   .val{color:var(--purple);text-shadow:0 0 14px rgba(191,95,255,.3);}
    .stat .sub{font-size:11px;color:var(--dim);}

    /* inputs */
    .row{display:flex;gap:10px;align-items:center;}
    input.inp,textarea.inp{
      flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);
      p
